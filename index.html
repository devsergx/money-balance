<!DOCTYPE html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My money balance</title>
    <link href="./css/index.css" rel="stylesheet">
    <script type="module" src="./js/index.js"></script>
  </head>
  <body class="page__body">
    <div class="container">
      <div class="wrapper">
        <h1 class="title">Баланс</h1>
        <form class="form">
          <input class="form__input input-cash" type="number" placeholder="Наличка">
          <input class="form__input input-card" type="number" placeholder="Карта">
          <button class="form__button" type="submit">Отправить</button>
        </form>
        <p class="text text-cash"></p>
        <p class="text text-card"></p>
        <p class="text text-total"></p>
      </div>
    </div>
  </body>
</html>
